spring:
  datasource:
    url: ${PPS_DB_JDBCURL:jdbc:postgresql://localhost:5432/priceProviderService}
    driverClassName: ${PPS_DB_DRIVER:org.postgresql.Driver}
    username: ${PPS_DB_USERNAME:postgres}
    password: ${PPS_DB_PASSWORD:postgres}
  jpa:
    database-platform: ${PPS_JPA_DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: update
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${PPS_OIDC_ISSUER_URI:http://localhost:8081/realms/priceprovider}

service-config:
  initialize:
    data-folder: "src/main/resources/initialize/"
    essential-data-on: false
    sample-data-on: false

priceprovider:
  oidc:
    client-id: ${PPS_OIDC_CLIENT_ID:priceprovider-service}
    groups-claim: ${PPS_OIDC_GROUPS_CLAIM:groups}
    organization-path-prefix: ${PPS_OIDC_ORG_PATH_PREFIX:/organizations/}
    resource-access-roles-path: resource_access.{clientId}.roles
    realm-roles-path: realm_access.roles
  cors:
    allowed-origins: ${PPS_CORS_ALLOWED_ORIGINS:*}

log:
  file:
    path: logs/