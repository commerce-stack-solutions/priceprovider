<?xml version="1.0" encoding="UTF-8"?>
<svg width="340" height="60" viewBox="0 0 340 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradients for boxes -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- Font styling is handled by external CSS -->
    <style type="text/css">
      text {
        font-family: 'Roboto', sans-serif;
        font-weight: 200;
        fill: currentColor;
      }
      
      @media (prefers-color-scheme: dark) {
        text {
          fill: #E5E7EB;
        }
      }
    </style>
  </defs>

  <!-- Vertical boxes -->
  <g transform="translate(20,5)">
    <rect x="0" y="0" width="24" height="48" rx="4" fill="url(#gradient1)">
      <animate attributeName="height" from="0" to="48" dur="0.6s" begin="0.2s" fill="freeze" />
    </rect>
    <rect x="32" y="0" width="24" height="48" rx="4" fill="url(#gradient2)">
      <animate attributeName="height" from="0" to="48" dur="0.6s" begin="0.2s" fill="freeze" />
    </rect>
    <rect x="64" y="0" width="24" height="48" rx="4" fill="url(#gradient3)">
      <animate attributeName="height" from="0" to="48" dur="0.6s" begin="0.4s" fill="freeze" />
    </rect>
  </g>

  <!-- Text with modern font stack -->
  <g transform="translate(110,23)">
    <text>
      <tspan x="10" y="2" font-size="24">Composable</tspan>
      <tspan x="10" y="26" font-size="24">Commerce Starters</tspan>
    </text>
  </g>
</svg>