<div class="header-wrapper">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <div class="d-flex align-items-center">
        <button class="btn btn-outline-light me-3" type="button" (click)="sidebarToggle.emit()">
          <i class="bi bi-list"></i>
        </button>
        <a class="navbar-brand" href="#">price|manager</a>
      </div>
      <div class="d-flex align-items-center gap-2">
        <!-- Authenticated user info -->
        @if (authService.isAuthenticated()) {
          <span class="text-light small me-1">
            <i class="bi bi-person-circle me-1"></i>
            {{ authService.userProfile()?.preferred_username || authService.userProfile()?.name || 'User' }}
          </span>
          <button class="btn btn-outline-light btn-sm" (click)="logout()" title="Logout">
            <i class="bi bi-box-arrow-right me-1"></i>{{ 'common.auth.logout' | transloco }}
          </button>
        } @else {
          <button class="btn btn-outline-light btn-sm" (click)="login()" title="Login">
            <i class="bi bi-box-arrow-in-right me-1"></i>{{ 'common.auth.login' | transloco }}
          </button>
        }
        <button class="btn btn-outline-light" (click)="toggleSessionConfig()" title="Session Configuration">
          <i class="bi bi-sliders"></i>
        </button>
      </div>
    </div>
  </nav>

  @if (showSessionConfig()) {
    <div class="session-config-panel border-bottom border-top p-3" [class.bg-light]="theme() === 'light'" [class.bg-dark]="theme() === 'dark'">
      <div class="container-fluid">
        <div class="row align-items-center g-3">
          <div class="col">
            <div class="d-flex align-items-center gap-3">
              <label for="languageSelect" class="form-label mb-0 fw-bold">{{ 'common.fields.language' | transloco }}:</label>
              <select 
                id="languageSelect" 
                class="form-select form-select-sm" 
                style="width: auto;"
                [(ngModel)]="selectedLanguage">
                @for (lang of sessionService.availableLanguages(); track lang.isoKey) {
                  <option [value]="lang.isoKey">{{ lang.isoKey.toUpperCase() }}</option>
                }
              </select>
              <button class="btn btn-primary btn-sm" (click)="applySessionConfig()">{{ 'common.actions.apply' | transloco }}</button>
            </div>
          </div>
          <div class="col-auto">
            <div class="form-check form-switch mb-0">
              <input 
                class="form-check-input" 
                type="checkbox" 
                role="switch" 
                id="themeSwitch"
                [checked]="theme() === 'dark'"
                (change)="toggleTheme()"
                aria-label="Toggle between light and dark theme">
              <label class="form-check-label fw-bold" for="themeSwitch">
                <i class="bi" [class]="theme() === 'dark' ? 'bi-moon-fill' : 'bi-sun-fill'"></i>
                {{ theme() === 'dark' ? 'Dark Mode' : 'Light Mode' }}
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>
  }
</div>
