@if (visibleLanguageKeys().length > 0) {
  <div class="row">
    <div class="col-sm-3">
      <strong>{{ fieldLabel }}</strong>
    </div>
    <div class="col-sm-9">
      <dl class="row mb-0">
        @for (lang of visibleLanguageKeys(); track lang) {
          <dt class="col-sm-3" [class.text-muted]="isInactive(lang)">
            <strong>{{ lang | uppercase }}</strong>@if (isMandatory(lang)) {<strong class="text-danger">*</strong>}@if (isInactive(lang)) {<span class="badge bg-secondary ms-1">Inactive</span>}
          </dt>
          <dd class="col-sm-9" [class.text-muted]="isInactive(lang)">
            {{ values![lang] }}
          </dd>
        }
      </dl>
    </div>
  </div>
}
