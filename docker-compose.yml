services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: price-provider-db
    environment:
      POSTGRES_DB: priceProviderService
      POSTGRES_USER: ${PPS_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${PPS_DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - price-provider-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PPS_DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak Identity Provider (dev/test only)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
    volumes:
      - ./idp/keycloak:/opt/keycloak/data/import
    networks:
      - price-provider-network

  # Backend Service
  service:
    image: price-provider-service:${VERSION:-0.0.0-SNAPSHOT}
    container_name: price-provider-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      PPS_DB_JDBCURL: ${PPS_DB_JDBCURL:-jdbc:postgresql://db:5432/priceProviderService}
      PPS_DB_USERNAME: ${PPS_DB_USERNAME:-postgres}
      PPS_DB_PASSWORD: ${PPS_DB_PASSWORD:-postgres}
      PPS_DB_DRIVER: ${PPS_DB_DRIVER:-org.postgresql.Driver}
      PPS_JPA_DB_PLATFORM: ${PPS_JPA_DB_PLATFORM:-org.hibernate.dialect.PostgreSQLDialect}
      PPS_OIDC_ISSUER_URI: ${PPS_OIDC_ISSUER_URI:-http://localhost:8081/realms/priceprovider}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${PPS_OIDC_JWK_SET_URI:-http://keycloak:8080/realms/priceprovider/protocol/openid-connect/certs}
      PPS_OIDC_CLIENT_ID: ${PPS_OIDC_CLIENT_ID:-priceprovider-service}
      PPS_CORS_ALLOWED_ORIGINS: ${PPS_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:4200}
      SERVICE_CONFIG_INITIALIZE_ESSENTIAL_DATA_ON: ${SERVICE_CONFIG_INITIALIZE_ESSENTIAL_DATA_ON:-true}
      SERVICE_CONFIG_INITIALIZE_SAMPLE_DATA_ON: ${SERVICE_CONFIG_INITIALIZE_ESSENTIAL_DATA_ON:-true}
    ports:
      - "8080:8080"
    networks:
      - price-provider-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/public/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend App
  app:
    image: price-manager-app:${VERSION:-0.0.0-SNAPSHOT}
    container_name: price-manager-app
    depends_on:
      service:
        condition: service_healthy
    environment:
      PPS_BASEURL: ${PPS_BASEURL:-http://localhost:8080/}
      PPS_OIDC_ISSUER_URI: ${PPS_OIDC_ISSUER_URI:-http://localhost:8081/realms/priceprovider}
      PPS_OIDC_REQUIRE_HTTPS: ${PPS_OIDC_REQUIRE_HTTPS:-false}
    ports:
      - "80:80"
    networks:
      - price-provider-network

networks:
  price-provider-network:
    driver: bridge

volumes:
  postgres_data:
