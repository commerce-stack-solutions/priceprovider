apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: price-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: price-manager-app:0.0.0-SNAPSHOT
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: 80
          env:
            - name: PPS_BASEURL
              value: http://service.priceprovider.local/
            - name: PPS_OIDC_ISSUER_URI
              value: http://keycloak.priceprovider.local/realms/priceprovider
            - name: PPS_OIDC_REQUIRE_HTTPS
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: price-provider
spec:
  selector:
    app: app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-hpa
  namespace: price-provider
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
