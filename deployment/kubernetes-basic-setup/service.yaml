apiVersion: apps/v1
kind: Deployment
metadata:
  name: service
  namespace: price-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service
  template:
    metadata:
      labels:
        app: service
    spec:
      containers:
        - name: service
          image: price-provider-service:0.0.0-SNAPSHOT
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8080
          env:
            - name: PPS_DB_JDBCURL
              value: jdbc:postgresql://db:5432/priceProviderService
            - name: PPS_DB_USERNAME
              value: postgres
            - name: PPS_DB_PASSWORD
              value: postgres
            - name: PPS_DB_DRIVER
              value: org.postgresql.Driver
            - name: PPS_JPA_DB_PLATFORM
              value: org.hibernate.dialect.PostgreSQLDialect
            - name: PPS_OIDC_ISSUER_URI
              value: http://keycloak.priceprovider.local/realms/priceprovider
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: http://keycloak.priceprovider.local/realms/priceprovider/protocol/openid-connect/certs
            - name: PPS_OIDC_CLIENT_ID
              value: priceprovider-service
            - name: PPS_CORS_ALLOWED_ORIGINS
              value: "http://localhost,http://localhost:4200,http://app.priceprovider.local"
            - name: SERVICE_CONFIG_INITIALIZE_ESSENTIAL_DATA_ON
              value: "true"
            - name: SERVICE_CONFIG_INITIALIZE_SAMPLE_DATA_ON
              value: "true"
          readinessProbe:
            httpGet:
              path: /public/actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: service
  namespace: price-provider
spec:
  selector:
    app: service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: service-hpa
  namespace: price-provider
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
